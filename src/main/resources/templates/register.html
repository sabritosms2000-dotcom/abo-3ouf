<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Abo-Auf
    Shop</title>
  <meta name="description" content="Create your abo auf Shop account."/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<img src="aboauf.png" alt="logo" >

  <div class="auth-card">
    <div class="auth-logo">
      <h2>Sign up</h2>
    </div>

    <p class="auth-subtitle">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </p>


    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" style="display:flex; flex-direction:column; gap:0.9rem;">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.9rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label for="firstName">First Name</label>
          <input id="firstName" type="text" name="firstName"
                 placeholder="Ahmad" minlength="3" maxlength="15" required/>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="lastName">Last Name</label>
          <input id="lastName" type="text" name="lastName"
                 placeholder="Ali" minlength="3" maxlength="15" required/>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email"
               placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password"
               placeholder="Min 5 characters" minlength="5" maxlength="15" required/>
      </div>

      <button type="submit" class="btn-submit">Create Account →</button>
    </form>
  </div>

</body>
</html>
