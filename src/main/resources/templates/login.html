<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Abo-Auf Shop</title>
  <meta name="description" content="Sign in to your abo-auf Shop account."/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<img src="aboauf.png" alt="logo" >
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <h2>Login page</h2>
    </div>

    <p class="auth-subtitle">
      Don't have an account? <a th:href="@{/register}">Register here</a>
    </p>


    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" method="post" style="display:flex; flex-direction:column; gap:0.9rem;">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn-submit">Sign In →</button>

    </form>
  </div>

</body>
</html>
